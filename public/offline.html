<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline · Study Buddy</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #fdf2f8 100%);
        color: #0f172a;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 28rem;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      h1 {
        margin: 8px 0 4px;
        font-size: 1.5rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 4px 0;
        color: #475569;
      }
      button {
        margin-top: 18px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 56px">📵</div>
      <h1>You're offline</h1>
      <p>Study Buddy needs an internet connection to load.</p>
      <p>Reconnect and try again.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
